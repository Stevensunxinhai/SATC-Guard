experiment:
  name: atco2_1h_dual_baseline_satc_guard
  seed: 42
  prompt_version: v1.0.0
  protocol: strict_online  # strict_online | oracle_context

data:
  manifest_version: v1
  manifest_path: data/manifests/segments_v1.jsonl
  split_path: data/manifests/splits/recording_split_v1.json
  cache_dir: data/cache/segments
  dev_ratio: 0.2
  filters:
    correct_transcript_only: true
    english_only: true

inference:
  max_workers: 4
  retry_max: 3
  retry_backoff_sec: 2.0
  checkpoint_every: 10

harness:
  memory_window_sec: 60
  memory_max_segments: 12
  context_top_k_callsigns: 20
  context_top_k_waypoints: 15

evaluation:
  bootstrap_samples: 10000
  confidence_level: 0.95

runs:
  - id: gpt4o_direct
    backbone: openai
    mode: direct
  - id: gpt4o_guard
    backbone: openai
    mode: satc_guard
  - id: qwen_direct
    backbone: qwen
    mode: direct
  - id: qwen_guard
    backbone: qwen
    mode: satc_guard
  - id: mimo_direct
    backbone: mimo
    mode: direct
  - id: mimo_guard
    backbone: mimo
    mode: satc_guard
